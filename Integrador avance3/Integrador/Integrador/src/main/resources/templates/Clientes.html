<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>

    <!-- BOOTSTRAP Y ICONOS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Enlace original mantenido por si lo ocupa tu navAdmin -->
    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
</head>

<body class="bg-light">

<div class="container-fluid">
    <div class="row g-0">

        <!-- SIDEBAR -->
        <aside class="col-12 col-md-3 col-lg-2 border-end bg-white min-vh-100">
            <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="col-12 col-md-9 col-lg-10 p-4 p-lg-5 content">

            <!-- HEADER Y BUSCADOR -->
            <div class="d-flex flex-wrap align-items-center mb-5 gap-3">
                <div class="input-group shadow-sm rounded-pill overflow-hidden" style="max-width: 400px;">
                    <span class="input-group-text bg-white border-0 ps-4">
                        <i class="bi bi-search text-success"></i>
                    </span>
                    <input type="text" class="form-control border-0 shadow-none py-2 bg-white" placeholder="Buscar clientes...">
                </div>
            </div>

            <!-- TÍTULO -->
            <div class="mb-4">
                <h2 class="fw-bold text-success mb-0">Clientes</h2>
            </div>

            <!-- TARJETA CONTENEDORA DE LA TABLA -->
            <div class="card shadow-sm border-0 rounded-4 bg-white p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        
                        <thead class="table-light text-success">
                            <tr>
                                <th class="py-3">Cliente</th>
                                <th class="py-3">Nivel</th>
                                <th class="py-3">Última compra</th>
                                <th class="py-3">Deuda</th>
                            </tr>
                        </thead>

                        <tbody class="border-top-0">
                            
                            <!-- CLIENTE 1 -->
                            <tr>
                                <td class="fw-medium text-dark d-flex align-items-center gap-3 py-3">
                                    <!-- Avatar Bootstrap -->
                                    <span class="bg-success bg-opacity-10 text-success fw-bold rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-size: 0.85rem;">
                                        GS
                                    </span> 
                                    Granja San Pedro
                                </td>
                                <td>
                                    <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-3 py-2">Premium</span>
                                </td>
                                <td class="text-muted">2026-05-02</td>
                                <td class="text-success fw-bold">S/ 0</td>
                            </tr>

                            <!-- CLIENTE 2 -->
                            <tr>
                                <td class="fw-medium text-dark d-flex align-items-center gap-3 py-3">
                                    <!-- Avatar Naranja corporativo -->
                                    <span class="fw-bold rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-size: 0.85rem; background-color: rgba(253, 126, 20, 0.1); color: #fd7e14;">
                                        AE
                                    </span> 
                                    Avícola El Sol
                                </td>
                                <td>
                                    <span class="badge rounded-pill px-3 py-2 border" style="background-color: rgba(253, 126, 20, 0.1); color: #fd7e14; border-color: rgba(253, 126, 20, 0.25) !important;">Standard</span>
                                </td>
                                <td class="text-muted">2026-04-30</td>
                                <td class="text-danger fw-bold">S/ 1240</td>
                            </tr>

                            <!-- CLIENTE 3 -->
                            <tr>
                                <td class="fw-medium text-dark d-flex align-items-center gap-3 py-3">
                                    <span class="bg-success bg-opacity-10 text-success fw-bold rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-size: 0.85rem;">
                                        PA
                                    </span> 
                                    Postura Andina
                                </td>
                                <td>
                                    <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-3 py-2">Premium</span>
                                </td>
                                <td class="text-muted">2026-05-04</td>
                                <td class="text-success fw-bold">S/ 0</td>
                            </tr>

                            <!-- CLIENTE 4 -->
                            <tr>
                                <td class="fw-medium text-dark d-flex align-items-center gap-3 py-3">
                                    <span class="fw-bold rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-size: 0.85rem; background-color: rgba(253, 126, 20, 0.1); color: #fd7e14;">
                                        DL
                                    </span> 
                                    Don Lucho
                                </td>
                                <td>
                                    <span class="badge rounded-pill px-3 py-2 border" style="background-color: rgba(253, 126, 20, 0.1); color: #fd7e14; border-color: rgba(253, 126, 20, 0.25) !important;">Standard</span>
                                </td>
                                <td class="text-muted">2026-04-25</td>
                                <td class="text-danger fw-bold">S/ 320</td>
                            </tr>

                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
