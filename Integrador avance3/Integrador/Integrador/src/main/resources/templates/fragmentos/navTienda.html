<html xmlns:th="http://www.thymeleaf.org">

<!-- Se eliminó el doble <nav> y se unificó en uno solo que abarca el 100% (w-100) -->
<nav th:fragment="navbarT" class="navbar navbar-expand-lg bg-white shadow-sm py-3 sticky-top w-100">
  <div class="container-fluid px-lg-5">
    
    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center me-4" href="/">
      <img src="https://github.com/davonlzz18/multimedia/blob/main/LOGOTIPO%20AI-10.png?raw=true" 
           alt="Animal Feed Solutions" 
           class="img-fluid" 
           style="max-height: 100px; width: auto; object-fit: contain;">
    </a>

    <!-- Botón Responsive (para celulares) -->
    <button class="navbar-toggler border-0 text-success shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTienda">
      <i class="bi bi-list fs-1"></i>
    </button>

    <!-- Contenido del Navbar -->
    <div class="collapse navbar-collapse" id="navbarTienda">
      
      <!-- Buscador Central (flex-grow-1 para que tome el espacio disponible) -->
      <form class="d-flex mx-auto my-3 my-lg-0 flex-grow-1" style="max-width: 600px;">
        <div class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden border border-success border-opacity-25 w-100">
          <input type="text" class="form-control border-0 bg-light shadow-none px-4" placeholder="Buscar producto...">
          <button class="btn btn-success px-4 fw-bold" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>

      <!-- Enlaces e Iconos -->
      <div class="d-flex flex-column flex-lg-row align-items-center gap-3 gap-lg-4 ms-lg-4">
        
        <!-- Links de navegación (text-nowrap evita que "Mis Pedidos" se parta en 2 líneas) -->
        <ul class="navbar-nav flex-row gap-3 fw-medium text-nowrap">
          <li class="nav-item"><a class="nav-link text-dark" href="/tienda">Tienda</a></li>
          <li class="nav-item"><a class="nav-link text-dark" href="/misPedidos">Mis Pedidos</a></li>
          <li class="nav-item"><a class="nav-link text-dark" href="/miCuenta">Mi Cuenta</a></li>
        </ul>

        <!-- Iconos de Acción (Campana y Carrito) -->
        <div class="d-flex gap-3">
          
          <!-- Notificaciones (alineado al centro) -->
          <button class="btn btn-light rounded-circle position-relative p-0 border-0 shadow-sm d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;" data-bs-toggle="offcanvas" data-bs-target="#notiOffCanvas">
            <i class="bi bi-bell-fill text-success fs-5"></i>
            <!-- Punto naranja -->
            <span class="position-absolute top-0 start-100 translate-middle p-2 border border-2 border-white rounded-circle" style="background-color: #fd7e14;">
              <span class="visually-hidden">Nuevas notificaciones</span>
            </span>
          </button>

          <!-- Carrito (alineado al centro) -->
          <button class="btn btn-light rounded-circle position-relative p-0 border-0 shadow-sm d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
            <i class="bi bi-cart-fill text-success fs-5"></i>
            <!-- Contador naranja -->
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill border border-2 border-white text-white" style="background-color: #fd7e14;">
              0
            </span>
          </button>
          
        </div>
      </div>
      
    </div>
  </div>
</nav>

</html>
