<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo - AFS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/estilos/login.css}">
    <link rel="stylesheet" th:href="@{/estilos/formulario.css}">
</head>

<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                
                <div class="card shadow-lg border-0 rounded-4 bg-white p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 65px; height: 65px;">
                            <i class="bi bi-shield-lock-fill fs-2"></i>
                        </div>
                        <h4 class="fw-bold text-dark mb-1">Animal Feed Solutions</h4>
                        <p class="text-success fw-medium small mb-0">S.A.C. | Sistema interno</p>
                    </div>

                    <div id="alertaLoginAdmin"></div>

                    <p class="text-secondary text-center small mb-4">
                        Ingresa tu correo, contraseña y el código OTP para acceder.
                    </p>

                    <form>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control rounded-3 bg-light border-0" id="emailAdmin" placeholder="Email" required>
                            <label for="emailAdmin" class="text-muted"><i class="bi bi-envelope me-2"></i>Correo electrónico</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control rounded-3 bg-light border-0" id="passwordAdmin" placeholder="Password" required>
                            <label for="passwordAdmin" class="text-muted"><i class="bi bi-lock me-2"></i>Contraseña</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="text" class="form-control rounded-3" id="codigoAdmin" placeholder="Código de seguridad" style="border: 1px solid #fd7e14; background-color: rgba(253, 126, 20, 0.05);" required>
                            <label for="codigoAdmin" style="color: #fd7e14;"><i class="bi bi-key me-2"></i>Código OTP</label>
                        </div>

                        <button type="button" class="btn btn-outline-warning w-100 mb-3 rounded-pill fw-medium d-flex justify-content-center align-items-center gap-2" onclick="enviarCodigo()" style="color: #fd7e14; border-color: #fd7e14;">
                            <i class="bi bi-send-fill"></i> ENVIAR CÓDIGO
                        </button>

                        <button type="button" class="btn btn-success w-100 mb-4 rounded-pill fw-bold shadow-sm d-flex justify-content-center align-items-center gap-2 py-2" onclick="validarAdmin()">
                            INGRESAR <i class="bi bi-box-arrow-in-right fs-5"></i>
                        </button>
                    </form>

                    <div class="text-center mt-2">
                        <a th:href="@{/}" class="text-secondary text-decoration-none small fw-medium d-inline-flex align-items-center gap-2 nav-link-hover">
                            <i class="bi bi-arrow-left"></i> Cancelar y volver al inicio
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:src="@{/script/loginRoles.js}"></script>

    <style>
        .nav-link-hover:hover {
            color: #198754 !important;
            transition: color 0.2s ease-in-out;
        }
        
        /* Ajuste de color al enfocar los inputs */
        .form-control:focus {
            box-shadow: none;
            border: 1px solid #198754 !important;
            background-color: #ffffff !important;
        }
        
        #codigoAdmin:focus {
            border: 1px solid #fd7e14 !important;
            box-shadow: 0 0 0 0.25rem rgba(253, 126, 20, 0.25) !important;
        }
    </style>
</body>

</html>
