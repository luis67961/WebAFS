<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de pagos</title>

    <!-- BOOTSTRAP E ICONOS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Enlace original mantenido para el Sidebar -->
    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
</head>

<body class="bg-light">

    <div class="container-fluid px-0">
        <div class="row g-0">

            <!-- SIDEBAR -->
            <aside class="col-12 col-md-3 col-lg-2 border-end bg-white min-vh-100">
                <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
            </aside>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-12 col-md-9 col-lg-10 p-4 p-lg-5 content">

                <!-- CONTENEDOR DINÁMICO (Manejado por pagos.js) -->
                <!-- Se agregó w-100 para asegurar que tome todo el ancho disponible -->
                <section id="pagosContent" class="w-100"></section>

            </main>

        </div>
    </div>

    <!-- SCRIPTS -->
    <script th:src="@{/script/pagos.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
