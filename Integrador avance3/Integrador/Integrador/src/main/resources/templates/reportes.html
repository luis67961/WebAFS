<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <link rel="stylesheet" th:href="@{/script/css/Reportes.css}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Reportes</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

    <div class="d-flex align-items-stretch min-vh-100">

        <aside class="bg-white border-end" style="width: 250px; flex-shrink: 0;">
            <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
        </aside>

        <main class="flex-grow-1 p-4 p-md-5">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="h3 mb-1 text-success fw-bold">Centro de reportes</h2>
                    <div class="text-secondary fw-medium">Información estratégica para cada área de la empresa</div>
                </div>
            </div>

            <div id="report-cards" class="row g-4 mb-4">
                </div>

            <div class="card bg-white border-0 shadow-sm rounded-4 mt-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-center">
                    <h4 class="mb-0 text-dark fw-bold" id="report-title">Reporte de Ventas</h4>
                    
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-danger rounded-pill px-3 shadow-sm fw-medium" onclick="exportReport('pdf')">
                            <i class="bi bi-file-earmark-pdf-fill"></i> Exportar PDF
                        </button>
                        <button class="btn btn-outline-success rounded-pill px-3 shadow-sm fw-medium" onclick="exportReport('excel')">
                            <i class="bi bi-file-earmark-excel-fill"></i> Excel
                        </button>
                    </div>
                </div>
                
                <div class="card-body p-4" id="dynamic-report-content">
                    </div>
            </div>

        </main>

    </div>

    <script th:src="@{/script/reportes.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
</body>
</html>
