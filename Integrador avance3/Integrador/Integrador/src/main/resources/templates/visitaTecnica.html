<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas técnicas</title>

    <!-- BOOTSTRAP E ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Enlace original mantenido para el Sidebar -->
    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
</head>

<body class="bg-light">

    <div class="container-fluid px-0">
        <div class="row g-0">

            <!-- SIDEBAR -->
            <aside class="col-12 col-md-3 col-lg-2 border-end bg-white min-vh-100">
                <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
            </aside>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-12 col-md-9 col-lg-10 p-4 p-lg-5 content">

                <!-- TOOLBAR (Encabezado, Buscador y Botones) -->
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-4 mb-5">
                    
                    <!-- IZQUIERDA: TÍTULO -->
                    <div>
                        <h2 class="fw-bold text-success mb-0">Visitas técnicas</h2>
                    </div>

                    <!-- CENTRO: BUSCADOR -->
                    <div class="input-group shadow-sm rounded-pill overflow-hidden" style="max-width: 400px; width: 100%;">
                        <span class="input-group-text bg-white border-0 ps-4">
                            <i class="fa-solid fa-magnifying-glass text-success"></i>
                        </span>
                        <input type="text" class="form-control border-0 shadow-none py-2 bg-white" placeholder="ID o nombre de usuario">
                    </div>

                    <!-- DERECHA: BOTONES -->
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-success rounded-pill px-4 shadow-sm fw-bold d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#modalNuevaVisita">
                            <i class="fa-solid fa-plus"></i> Nueva visita
                        </button>
                        <button class="btn btn-white bg-white border rounded-pill px-4 shadow-sm fw-medium d-flex align-items-center gap-2 text-dark" onclick="cargarHistorial()">
                            <i class="fa-solid fa-clock-rotate-left text-secondary"></i> Historial
                        </button>
                    </div>

                </div>

                <!-- CONTENEDOR DE VISITAS -->
                <div class="visitas-wrapper">

                    <!-- Contenedor de Búsqueda (Controlado por JS) -->
                    <div id="searchResults" class="search-results hidden mb-4"></div>

                    <!-- PENDIENTES -->
                    <div class="mb-5">
                        <div class="d-flex align-items-center gap-2 mb-4">
                            <!-- Naranja corporativo para pendiente -->
                            <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; background-color: rgba(253, 126, 20, 0.1); color: #fd7e14;">
                                <i class="fa-solid fa-clock"></i>
                            </div>
                            <h4 class="fw-bold text-dark mb-0">Solicitudes pendientes</h4>
                        </div>
                        <!-- Tu JS inyectará las tarjetas aquí -->
                        <div class="row g-4" id="visitasPendientes"></div>
                    </div>

                    <!-- PROGRAMADAS -->
                    <div class="mb-5">
                        <div class="d-flex align-items-center gap-2 mb-4">
                            <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
                                <i class="fa-solid fa-calendar-check"></i>
                            </div>
                            <h4 class="fw-bold text-dark mb-0">Visitas programadas</h4>
                        </div>
                        <!-- Tu JS inyectará las tarjetas aquí -->
                        <div class="row g-4" id="visitasProgramadas"></div>
                    </div>

                </div>

                <!-- HISTORIAL DE VISITAS (Tabla) -->
                <div class="card shadow-sm border-0 rounded-4 bg-white p-4 mt-4">
                    
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <i class="fa-solid fa-table fs-5 text-success"></i>
                        <h4 class="fw-bold text-dark mb-0">Historial de Visitas</h4>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-success">
                                <tr>
                                    <th class="py-3">ID</th>
                                    <th class="py-3">Usuario</th>
                                    <th class="py-3">Teléfono</th>
                                    <th class="py-3">Especialista</th>
                                    <th class="py-3">Fecha Programada</th>
                                    <th class="py-3">Estado</th>
                                </tr>
                            </thead>
                            <tbody id="tablaHistorial" class="border-top-0">
                                <!-- dinámico -->
                            </tbody>
                        </table>
                    </div>

                </div>

            </main>

        </div>
    </div>

    <!-- ==============================================
         MODAL: AGREGAR DETALLES DE VISITA
    =============================================== -->
    <div class="modal fade" id="visitaModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold text-success">Agregar Visita Técnica</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body px-4">
                    <input type="hidden" id="visitaId">

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-medium small mb-1">Usuario</label>
                        <input type="text" id="nombreUsuario" class="form-control bg-light border-0 py-2 text-muted" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-medium small mb-1">Teléfono</label>
                        <input type="text" id="telefonoUsuario" class="form-control bg-light border-0 py-2 text-muted" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-medium small mb-1">Fecha de visita</label>
                        <input type="date" id="fechaVisita" class="form-control bg-light border-0 py-2">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-medium small mb-1">Dirección</label>
                        <input type="text" id="direccion" class="form-control bg-light border-0 py-2" value="Av. Jaime Blanco 123">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-medium small mb-1">Especialista</label>
                        <input type="text" id="especialista" class="form-control bg-light border-0 py-2" placeholder="Nombre del especialista asignado">
                    </div>
                </div>

                <div class="modal-footer border-top-0 pb-4 px-4">
                    <button class="btn btn-light rounded-pill px-4 fw-medium" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success rounded-pill px-4 fw-bold shadow-sm" onclick="guardarVisita()">Guardar visita</button>
                </div>

            </div>
        </div>
    </div>

    <!-- ==============================================
         MODAL: NUEVA SOLICITUD DE VISITA
    =============================================== -->
    <div class="modal fade" id="modalNuevaVisita" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold text-success">Nueva Visita Técnica</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body px-4">
                    <div class="mb-3">
                        <label class="form-label text-secondary fw-medium small mb-1">Nombre de usuario</label>
                        <input type="text" id="nuevoUsuario" class="form-control bg-light border-0 py-2 rounded-3" placeholder="Ej. Juan Pérez">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary fw-medium small mb-1">Teléfono</label>
                        <input type="text" id="nuevoTelefono" class="form-control bg-light border-0 py-2 rounded-3" placeholder="Ej. 999 888 777">
                    </div>
                </div>

                <div class="modal-footer border-top-0 pb-4 px-4">
                    <button class="btn btn-light rounded-pill px-4 fw-medium" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success rounded-pill px-4 fw-bold shadow-sm" onclick="crearVisita()">Crear visita</button>
                </div>

            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script th:src="@{/script/visitaTec.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
